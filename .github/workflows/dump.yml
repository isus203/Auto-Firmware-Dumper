name: Auto Firmware Dumper

on:
  workflow_dispatch:
    inputs:
      USER_NAME:
        description: 'Name of your GitHub Account'
        required: true
        default: 'isus203'
      USER_EMAIL:
        description: 'E-mail of your GitHub Account'
        required: true
        default: ''
      FIRMWARE_URL:
        description: 'Stock ROM Link Google Drive '
        required: true
        default: ''
      VENDOR_NAME:
        description: 'Device manufacturer'
        required: true
        default: ''
      CODE_NAME:
        description: 'Code name '
        required: true
        default: ''
      GENERATE_VENDOR:
        description: 'Create Vendor Tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_LINEAGE_DT:
        description: 'Upload LineageOS tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_TWRP_DT:
        description: 'Upload TWRP tree'
        required: true
        default: 'false'
        type: boolean

jobs:
  dump:
    name: Auto Firmware Dumper
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GTOKEN }}
      TWT: ${{ github.event.inputs.UPLOAD_TWRP_DT }}
      LOT: ${{ github.event.inputs.UPLOAD_LINEAGE_DT }}
      GVT: ${{ github.event.inputs.GENERATE_VENDOR }}
      FUR: ${{ github.event.inputs.FIRMWARE_URL }}
      VENDOR: ${{ github.event.inputs.VENDOR_NAME }}
      CODE: ${{ github.event.inputs.CODE_NAME }}
      UN: ${{ github.event.inputs.USER_NAME }}
      UEM: ${{ github.event.inputs.USER_EMAIL }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: rokibhasansagar/slimhub_actions@main
    - uses: sersoft-gmbh/setup-gh-cli-action@v2
      with:
        version: stable
          
    - name: Clone and Setup DumprX
      run: |
        git clone https://github.com/DumprX/DumprX
        cd DumprX
        sudo chmod +x *.sh
        bash setup.sh
        pip3 install aospdtgen twrpdtgen
      
    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
    - name: Update Packages
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install cpio aria2 git python3 neofetch tar gzip  p7zip-full python3-pip lz4 erofs-utils f2fs-tools libvixl-dev
        pip install gdown

    - name: Setup GithubCLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
        
    - name: Authorize Git And GitHub CLI
      run: |
        git config --global user.name "${{ env.UN }}"
        git config --global user.email "${{ env.UEM }}"
        git config --global http.postBuffer 999999999
        git config --global core.compression 9
        unset GITHUB_TOKEN
        gh auth login --with-token <<< "${{ secrets.GTOKEN }}"
      working-directory: ${{ github.workspace }}
  
    - name: Install firmware 
      run: |
        cd DumprX
        gdown "${{ env.FUR }}" -O firmware.zip
      working-directory: ${{ github.workspace }}
        
    - name: Create Dump
      run: |
        cd DumprX
        bash dumper.sh ./firmware.zip
        sudo chown -R $USER:$USER out
        sudo chmod -R 755 out
      working-directory: ${{ github.workspace }}

    - name: Extract Device Info
      run: |
        cd DumprX/out

        is_garbage() {
            local val=$(echo "$1" | tr '[:lower:]' '[:upper:]')
            [[ -z "$1" || "$val" == "FULL-64" || "$val" == "GENERIC" || "$val" == "UNKNOWN" || "$val" == "SVP" ]]
        }

        # 1. Извлекаем FINGERPRINT
        fingerprint=$(grep -m1 -oP "(?<=^ro.build.fingerprint=).*" -hs {system,system/system,vendor,product,system_ext}/build*.prop | head -1)
        [[ -z "${fingerprint}" ]] && fingerprint=$(grep -m1 -oP "(?<=^ro.vendor.build.fingerprint=).*" -hs vendor/build*.prop | head -1)
        [[ -z "${fingerprint}" ]] && fingerprint=$(grep -m1 -oP "(?<=^ro.system.build.fingerprint=).*" -hs {system,system/system,system_ext}/build*.prop | head -1)

        # 2. Извлекаем BRAND
        brand=$(grep -m1 -oP "(?<=^ro.product.brand=).*" -hs {system,system/system,vendor,product,system_ext}/build*.prop | head -1)
        is_garbage "$brand" && brand=$(grep -m1 -oP "(?<=^ro.product.vendor.brand=).*" -hs vendor/build*.prop | head -1)
        is_garbage "$brand" && brand=$(grep -m1 -oP "(?<=^ro.product.product.brand=).*" -hs product/build*.prop | head -1)
        [[ -z "${brand}" || ${brand} == "OPPO" ]] && brand=$(grep -m1 -oP "(?<=^ro.product.system.brand=).*" -hs vendor/euclid/*/build.prop | head -1)
        is_garbage "$brand" && brand=$(echo "$fingerprint" | cut -d'/' -f1)
        brand=$(echo "$brand" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

        # 3. Извлекаем CODENAME
        codename=$(grep -m1 -oP "(?<=^ro.product.device=).*" -hs {vendor,system,system/system,product,system_ext}/build*.prop | head -1)
        is_garbage "$codename" && codename=$(grep -m1 -oP "(?<=^ro.product.vendor.device=).*" -hs vendor/build*.prop | head -1)
        is_garbage "$codename" && codename=$(grep -m1 -oP "(?<=^ro.product.product.device=).*" -hs product/build*.prop | head -1)
        is_garbage "$codename" && codename=$(echo "$fingerprint" | cut -d'/' -f3 | cut -d':' -f1)
        codename=$(echo "$codename" | tr -d '[:space:]')

        # 4. Извлекаем VERSION
        version=$(grep -m1 -oP "(?<=^ro.build.version.release_or_codename=).*" -hs {system,system/system,vendor,product,system_ext}/build*.prop | head -1)
        [[ -z "${version}" ]] && version=$(grep -m1 -oP "(?<=^ro.build.version.release=).*" -hs {system,system/system,vendor,product,system_ext}/build*.prop | head -1)
        version=$(echo "$version" | tr -d '[:space:]')

        # Сохраняем результаты (используем путь workspace для надежности)
        echo "$codename" > ${{ github.workspace }}/codename.txt
        echo "$brand" > ${{ github.workspace }}/brand.txt
        echo "$version" > ${{ github.workspace }}/version.txt
        echo "$fingerprint" > ${{ github.workspace }}/fingerprint.txt
        
        echo "Detected: $brand $codename (Android $version)"

    - name: Uploading ROM Dump
      run: |
        # Загружаем сохраненные данные
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        # Подготовка дерева
        los_dir="lineage-device-tree"
        [ -d "DumprX/out/$los_dir" ] && cp -r "DumprX/out/$los_dir" ${{ github.workspace }}/

        cd DumprX/out
        sudo chmod -R 777 *
        sudo rm -rf .git
        
        dat=$(date +%Y%m%d)
        description="Dump for $brand $codename"
        
        git init
        git branch -M dump-"$codename"-"$dat"
        git add .
        git commit -s -m "Dump for $brand $codename"
        gh repo create dump_"$brand"_"$codename" --public --description="$description" --source=. --remote=origin --push
        
        # Создаем структуру для Vendor Tree
        cd ${{ github.workspace }}
        mkdir -p vnd_project/dump
        mkdir -p vnd_project/android/device/"$brand"/"$codename"
        
        if [ -d "$los_dir" ]; then
           mv ${{ github.workspace }}/$los_dir/* vnd_project/android/device/"$brand"/"$codename"/
        fi
        mv DumprX/out/* vnd_project/dump/ 2>/dev/null || true

    - name: Create vendor tree
      if: env.GVT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        cd vnd_project
        if [ -d android/device/"$brand"/"$codename" ]; then
           git clone --depth=1 https://github.com/LineageOS/android_tools_extract-utils -b lineage-22.2 ./android/tools/extract-utils
           git clone --depth=1 https://github.com/LineageOS/android_prebuilts_extract-tools -b lineage-22.2 ./android/prebuilts/extract-tools
           
           sudo chmod 777 android/device/"$brand"/"$codename"/setup-makefiles.sh
           sudo chmod 777 android/device/"$brand"/"$codename"/extract-files.sh
           
           cd android/device/"$brand"/"$codename"
           bash extract-files.sh ${{ github.workspace }}/vnd_project/dump/
        else
           echo "LINEAGEOS DEVICE TREE NOT FOUND!"
           exit 1
        fi

    - name: Uploading Vendor Tree
      if: env.GVT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        cd vnd_project/android/vendor/"$brand"/"$codename"
        sudo chmod -R 777 *
        dat=$(date +%Y%m%d)
        git init
        git branch -M vendor-"$codename"-"$dat"
        git add .
        git commit -s -m "$codename : initial vendor tree"
        gh repo create android_vendor_"$brand"_"$codename" --public --description="Vendor tree for $codename" --source=. --remote=origin --push

    - name: Uploading LineageOS Device Tree
      if: env.LOT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        cd lineage-device-tree
        git init
        git branch -M lineage-"$codename"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename : LineageOS compatible device tree"
        gh repo create lineage_device_"$brand"_"$codename" --public --description="LineageOS compatible tree for $codename" --source=. --remote=origin --push
      continue-on-error: true

    - name: Uploading TWRP Device Tree
      if: env.TWT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        version=$(cat ${{ github.workspace }}/version.txt)
        
        cd twrp-device-tree
        # Поиск папки (некоторые дамперы кладут в разные подпапки)
        target_dir=$(find . -type d -name "$codename" | head -1)
        cd "$target_dir"
        
        git init
        git branch -M twrp-"$version"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename : TWRP compatible device tree"
        gh repo create twrp_device_"$brand"_"$codename" --public --description="TWRP compatible tree for $codename" --source=. --remote=origin --push
      continue-on-error: true

    - name: Uploading preview of images
      uses: actions/upload-artifact@v4
      with: 
        name: Prewiew images
        path: |
          /home/Auto-Firmware-Dumper/boot.img
          /home/Auto-Firmware-Dumper/recovery.img
          /home/Auto-Firmware-Dumper/vendor_boot.img
          /home/Auto-Firmware-Dumper/init_boot.img
          /home/Auto-Firmware-Dumper/dtbo.img
          /home/Auto-Firmware-Dumper/dtb.img
        if-no-files-found: ignore
      continue-on-error: true
